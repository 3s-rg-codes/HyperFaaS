syntax = "proto3";

option go_package = "github.com/3s-rg-codes/HyperFaaS/proto/function";
package function;



message Payload {
    bytes data = 1;
    string instanceId = 2;
    bool firstExecution = 3;
    string functionId = 4;
}
message Call {
    bytes data = 1;
    string instanceId = 2;
    string functionId = 3;
}

service FunctionService {
    rpc Ready (Payload) returns (Call);
}